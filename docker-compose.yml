services:

  # ── Bases de datos ──────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: argos_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: argos_db
      MYSQL_USER: argos_user
      MYSQL_PASSWORD: argos_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ArgosBackEnd/new_mysql_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: argos_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: argos_user
      MONGO_INITDB_ROOT_PASSWORD: argos_pass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express) ────────────────────────────────────────────

  backend:
    build:
      context: ./ArgosBackEnd
      dockerfile: Dockerfile
    container_name: argos_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file:
      - ./ArgosBackEnd/.env        # carga FIREBASE_* y demás secretos
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVICE_IP: 0.0.0.0
      # MySQL – nombres que usa el código (DBHOST, DBUSER, etc.)
      DBHOST: mysql
      DBPORT: 3306
      DBDB: argos_db
      DBUSER: argos_user
      DBPASS: argos_pass
      # CORS – permite que el frontend llame al backend
      CORS_FRONT_ORIGIN: http://localhost:3000

  # ── Frontend (Next.js) ───────────────────────────────────────────

  frontend:
    build:
      context: ./ArgosFrontEnd
      dockerfile: Dockerfile
    container_name: argos_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./ArgosBackEnd/.env        # reutiliza FIREBASE_* del backend
    environment:
      NODE_ENV: production
      PORT: 3000
      COOKIE_SECURE: "false"
      # Dentro de Docker, frontend habla con backend por nombre de servicio
      EXPRESS_BASE_URL: http://backend:3001
      FB_SESSION_MAX_AGE_MS: 3600000
      # MongoDB para media storage (GridFS)
      MONGO_URI: mongodb://argos_user:argos_pass@mongo:27017
      NEXT_TELEMETRY_DISABLED: "1"

  # ── Backup (MySQL + MongoDB → Google Drive) ──────────────────
  backup:
    build:
      context: ./argos-backup
      dockerfile: Dockerfile
      network: host
    container_name: argos_backup
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - backup_data:/backups
      - ./argos-backup/rclone.conf:/config/rclone/rclone.conf:ro
    environment:
      # MySQL
      MYSQL_HOST: mysql
      MYSQL_USER: argos_user
      MYSQL_PASS: argos_pass
      MYSQL_DB: argos_db
      # MongoDB
      MONGO_URI: mongodb://argos_user:argos_pass@mongo:27017
      # Google Drive
      GDRIVE_FOLDER: ArgosBackups
      RETENTION_DAYS: "7"

volumes:
  mysql_data:
  mongo_data:
  backup_data:
